name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: false

      - run: vp install --frozen-lockfile

      - run: vp run ready

      - run: npm publish
        working-directory: packages/cli
