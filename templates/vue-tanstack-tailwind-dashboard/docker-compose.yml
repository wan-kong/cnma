services:
  web:
    build:
      context: .
      args:
        VITE_ROOT_PREFIX_URL: ${VITE_ROOT_PREFIX_URL:-}
        VITE_API_MODE: ${VITE_API_MODE:-mock}
        VITE_GLOBAL_APP_TITLE: ${VITE_GLOBAL_APP_TITLE:-__PROJECT_NAME__}
    image: ${IMAGE_NAME:-__PROJECT_NAME__}:${IMAGE_VERSION:-latest}
    container_name: ${CONTAINER_NAME:-__PROJECT_NAME__}
    restart: always
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      APP_BASE_PATH: ${VITE_ROOT_PREFIX_URL:-}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
